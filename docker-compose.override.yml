# Development overrides
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up -d
services:
  openclaw-gateway:
    volumes:
      # Secure named volume for OpenClaw's internal data
      - openclaw_data:/home/node/.openclaw

      # Live reload bind mount for the bot's workspace
      - .:/home/node/.openclaw/workspace/what-watch-bot

      # Local bind mount for the SQLite database
      - ./db:/home/node/bot_data

volumes:
  openclaw_data:
