# Development overrides
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up -d
services:
  openclaw-gateway:
    volumes:
      # Secure named volume for OpenClaw's internal data (state, memory, credentials)
      - openclaw_data:/home/node/.openclaw

      # Local bind mount for the SQLite database
      - ./db:/home/node/what-watch-db

volumes:
  openclaw_data:
