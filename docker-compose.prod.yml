# Production overrides
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  openclaw-gateway:
    restart: always
    volumes:
      # Secure named volume for OpenClaw's internal data (state, memory, credentials)
      - openclaw_data:/home/node/.openclaw

      # Secure named volume for the bot's SQLite database
      - what_watch_db:/home/node/what-watch-db

volumes:
  openclaw_data:
  what_watch_db:
