services:
  openclaw-gateway:
    build: .
    container_name: what-watch-openclaw
    environment:
      HOME: /home/node
      TERM: xterm-256color
      DB_PATH: /home/node/bot_data/watchbot.db
    env_file:
      - .env
    ports:
      - "18789:18789"
      - "18790:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--port",
        "18789",
        "--allow-unconfigured",
      ]
