services:
  openclaw-gateway:
    build: .
    container_name: what-watch-openclaw
    environment:
      HOME: /home/node
      TERM: xterm-256color
      DB_PATH: /home/node/what-watch-db/watchbot.db
    env_file:
      - .env
    ports:
      - "18789:18789"
      - "18790:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "sh",
        "-c",
        "mkdir -p /home/node/.openclaw && ln -sfn /home/node/what-watch-bot /home/node/.openclaw/workspace && node dist/index.js gateway --port 18789 --allow-unconfigured",
      ]
